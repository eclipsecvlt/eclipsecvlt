<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* CARD */
.card {
    position: relative;
    overflow: hidden;
    border-radius: 20px;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    transition: 0.5s ease;
}

/* HOVER ZOOM */
.card:hover img {
    transform: scale(1.05);
}

/* OVERLAY (glass) */
.overlay {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 20px 25px;

    border-radius: 15px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255, 255, 255, 0.15);

    opacity: 0;
    transform: translateY(20px);
    transition: 0.4s ease;
}

/* SHOW ON HOVER */
.card:hover .overlay {
    opacity: 1;
    transform: translateY(0);
}

/* TITLE */
.title {
    font-size: 18px;
    font-weight: 500;
}

/* BUTTON */
.btn {
    padding: 10px 20px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 14px;

    background: white;
    color: black;

    transition: 0.3s;
}

/* BUTTON HOVER */
.btn:hover {
    background: #ddd;
}

/* MOBILE */
@media (max-width: 500px) {
    .gallery {
        padding: 20px;
    }

    .card img {
        height: 350px;
    }
}
</style>
</head>

<body>

<div class="gallery">

    <div class="card">
        <img src="G200_Clean.png" alt="">
        <div class="overlay">
            <div class="title">Outfit One</div>
            <a href="#" class="btn">Open</a>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/800x1000" alt="">
        <div class="overlay">
            <div class="title">Outfit Two</div>
            <a href="#" class="btn">Open</a>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/800x1000" alt="">
        <div class="overlay">
            <div class="title">Outfit Three</div>
            <a href="#" class="btn">Open</a>
        </div>
    </div>

</div>

</body>
</html>
