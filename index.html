<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* 🔥 BANNER */
.banner {
    width: 100%;
    height: 300px;
    overflow: hidden;
}

.banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* CARD */
.card {
    position: relative;
    overflow: hidden;
    border-radius: 20px;
}

.card img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    transition: 0.5s;
}

.card:hover img {
    transform: scale(1.05);
}

/* OVERLAY */
.overlay {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 18px;

    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);

    opacity: 0;
    transform: translateY(20px);
    transition: 0.4s;
}

.card:hover .overlay {
    opacity: 1;
    transform: translateY(0);
}

/* LEFT SIDE (title + socials) */
.left {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* TITLE */
.title {
    font-size: 14px;
}

/* SOCIAL BUTTONS */
.socials {
    display: flex;
    gap: 6px;
}

.social-btn {
    width: 28px;
    height: 28px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 50%;
    text-decoration: none;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);

    font-size: 12px; /* потом заменишь на иконки */
    color: white;

    transition: 0.3s;
}

.social-btn:hover {
    background: rgba(255,255,255,0.3);
}

/* MAIN BUTTON */
.btn {
    padding: 8px 18px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 13px;

    background: white;
    color: black;

    transition: 0.3s;
}

.btn:hover {
    background: #ddd;
}

/* MOBILE */
@media (max-width: 500px) {
    .banner {
        height: 200px;
    }

    .gallery {
        padding: 20px;
    }

    .card img {
        height: 350px;
    }
}
</style>
</head>

<body>

<!-- 🔥 БАННЕР -->
<div class="banner">
    <img src="banner.png" alt="">
</div>

<!-- ГАЛЕРЕЯ -->
<div class="gallery">

    <div class="card">
        <img src="images/Sakura_Clean.png" alt="">
        <div class="overlay">

            <div class="left">
                <div class="title">Outfit One</div>

                <div class="socials">
                    <a href="#" class="social-btn">I</a>
                    <a href="#" class="social-btn">F</a>
                    <a href="#" class="social-btn">X</a>
                </div>
            </div>

            <a href="#" class="btn">Open</a>

        </div>
    </div>
    
    <div class="card">
        <img src="images/Panda_Clean.png" alt="">
        <div class="overlay">

            <div class="left">
                <div class="title">Outfit One</div>

                <div class="socials">
                    <a href="#" class="social-btn">I</a>
                    <a href="#" class="social-btn">F</a>
                    <a href="#" class="social-btn">X</a>
                </div>
            </div>

            <a href="#" class="btn">Open</a>

        </div>
    </div>

    <div class="card">
        <img src="images/G200_Clean.png" alt="">
        <div class="overlay">

            <div class="left">
                <div class="title">Outfit One</div>

                <div class="socials">
                    <a href="#" class="social-btn">I</a>
                    <a href="#" class="social-btn">F</a>
                    <a href="#" class="social-btn">X</a>
                </div>
            </div>

            <a href="#" class="btn">Open</a>

        </div>
    </div>

</div>

</body>
</html>
